<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Rupee symbol ₹ -->
  <text
    x="32"
    y="44"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="36"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    dominant-baseline="auto"
  >₹</text>

  <!-- Small chart bars at the bottom for "calculator/finance" feel -->
  <rect x="12" y="52" width="6" height="5" rx="1" fill="rgba(255,255,255,0.4)"/>
  <rect x="21" y="49" width="6" height="8" rx="1" fill="rgba(255,255,255,0.4)"/>
  <rect x="30" y="46" width="6" height="11" rx="1" fill="rgba(255,255,255,0.6)"/>
  <rect x="39" y="48" width="6" height="9" rx="1" fill="rgba(255,255,255,0.4)"/>
  <rect x="48" y="50" width="6" height="7" rx="1" fill="rgba(255,255,255,0.4)"/>
</svg>
